name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install CJK fonts
        run: |
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=600 -o Acquire::https::Timeout=600 update
          sudo apt-get -o Acquire::Retries=5 -o Acquire::http::Timeout=600 -o Acquire::https::Timeout=600 install -y fontconfig fonts-noto-cjk

      - name: Install backend dependencies
        run: uv sync --extra dev

      - name: Run backend tests
        run: uv run pytest

      - name: Install frontend dependencies
        working-directory: src/web
        run: npm ci

      - name: Run frontend tests
        working-directory: src/web
        run: npm test

      - name: Build frontend
        working-directory: src/web
        run: npm run build
